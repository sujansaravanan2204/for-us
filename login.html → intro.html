<!DOCTYPE html>
<html>
<head>
<title>Enter ❤️</title>

<style>
body {
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.box {
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
}
</style>
</head>

<body>

<div class="box">
    <h2>Enter the password ❤️</h2>
    <input type="password" id="pass" placeholder="Only you know...">
    <br>
    <button onclick="check()">Enter</button>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;

    if (p === "2204") {  // CHANGE THIS
        window.location.href = "intro.html";
    } else {
        alert("Wrong password ❤️");
    }
}
</script>

</body>
</html>
