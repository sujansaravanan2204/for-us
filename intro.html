<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;

    opacity: 0;
    transition: opacity 0.8s ease;
}

body.loaded {
    opacity: 1;
}

/* TEXT */
h1 {
    font-size: 60px;
    letter-spacing: 5px;
    opacity: 0;
    animation: fade 2s forwards;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* ANIMATION */
@keyframes fade {
    0% {
        opacity: 0;
        transform: scale(0.8);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    h1 {
        font-size: 36px;
    }
}
</style>
</head>

<body>

<h1>US ❤️</h1>

<script>

/* FADE IN */
window.onload = () => {
    document.body.classList.add("loaded");
};

/* SMOOTH TRANSITION TO HOME */
setTimeout(() => {

    document.body.classList.remove("loaded");

    setTimeout(() => {
        window.location.href = "home.html";
    }, 500);

}, 2500);

</script>

</body>
</html>
