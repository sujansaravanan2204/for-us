<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* TEXT */
h1 {
    font-size: 60px;
    opacity: 0;
    letter-spacing: 5px;
    animation: fade 3s forwards;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* FADE ANIMATION */
@keyframes fade {
    0% {
        opacity: 0;
        transform: scale(0.8);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

/* MOBILE */
@media (max-width: 600px) {
    h1 {
        font-size: 36px;
    }
}
</style>
</head>
