<!DOCTYPE html>
<html>
<head>
<title>Us ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* SCREEN CONTROL */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: opacity 1s;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

/* WELCOME TEXT */
.welcome-text {
    font-size: 32px;
    line-height: 1.6;
}

/* LOGIN CARD (PRO LEVEL) */
.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 40px 30px;
    border-radius: 16px;
    width: 280px;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
}

/* TITLE */
.login-card h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

/* INPUT */
.login-card input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* BUTTON */
.login-card button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.login-card button:hover {
    background: #ff4b7d;
}

/* ERROR */
#error {
    margin-top: 10px;
    color: #ff4b7d;
    display: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("photo1.jpeg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

#typedText {
    font-size: 50px;
}

/* SECTION */
.section {
    padding: 100px 20px;
    background: #111;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    color: pink;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-100vh); opacity: 0; }
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.4);
}

/* MOBILE */
@media (max-width: 600px) {
    .welcome-text { font-size: 24px; }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="music.mp3">
</audio>

<!-- WELCOME -->
<div class="screen" id="welcome">
    <div class="welcome-text">
        <span id="typed"></span><br><br>
        <span id="typed2"></span><br><br>
        I made something for you ✨
    </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="login">
    <div class="login-card">
        <h2>Enter password</h2>

        <input type="password" id="pass" placeholder="Only you know..." />

        <button onclick="check()">Unlock</button>

        <div id="error">Wrong password ❤️</div>
    </div>
</div>

<!-- HOME -->
<div id="home" style="display:none;">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#memories">Memories</a>
</div>

<div class="hero">
    <h1 id="typedText"></h1>
</div>

<div class="section" id="memories">
    <h2>Our Memories 📸</h2>
    <img src="photo1.jpeg" width="250">
    <p>The day everything started ❤️</p>
</div>

</div>

<script>

/* MUSIC */
let music = document.getElementById("bgMusic");

/* TYPING */
let line1 = "Vanakkam Kuttima 🙏❤️";
let line2 = "AKA VIDHU MAA ❤️";

let i = 0, j = 0;

function typeLine1() {
    if (i < line1.length) {
        document.getElementById("typed").innerHTML += line1[i];
        i++;

        if (i === 1) {
            music.play().catch(()=>{});
        }

        setTimeout(typeLine1, 80);
    } else {
        setTimeout(typeLine2, 400);
    }
}

function typeLine2() {
    if (j < line2.length) {
        document.getElementById("typed2").innerHTML += line2[j];
        j++;
        setTimeout(typeLine2, 80);
    }
}

typeLine1();

/* FLOW */
setTimeout(() => {
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}, 3500);

/* LOGIN */
function check() {
    if (document.getElementById("pass").value === "2502") {
        document.getElementById("login").classList.add("hidden");

        setTimeout(() => {
            document.getElementById("home").style.display = "block";
            startMain();
        }, 800);

    } else {
        document.getElementById("error").style.display = "block";
    }
}

/* MAIN TEXT */
function startMain() {
    let text = "Hey Love ❤️";
    let i = 0;

    function type() {
        if (i < text.length) {
            document.getElementById("typedText").innerHTML += text[i];
            i++;
            setTimeout(type, 80);
        }
    }
    type();
}

/* SCROLL */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".section").forEach(sec => {
        if (sec.getBoundingClientRect().top < window.innerHeight - 100) {
            sec.classList.add("show");
        }
    });
});

/* HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);

</script>

</body>
</html>
