<!DOCTYPE html>
<html>
<head>
<title>Enter ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;

    opacity: 0;
    transition: opacity 0.8s ease;
}

body.loaded {
    opacity: 1;
}

/* WELCOME */
.welcome {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    text-align: center;
    transition: opacity 1s;
}

/* GLOW NAME */
.glow {
    color: #ff7eb3;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { text-shadow: 0 0 10px #ff7eb3; }
    50% { text-shadow: 0 0 25px #ff4b7d; }
    100% { text-shadow: 0 0 10px #ff7eb3; }
}

/* LOGIN */
.box {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 1s;
}

/* INPUT */
input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 220px;
}

/* BUTTON */
button {
    padding: 10px 15px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

/* ERROR */
#error {
    color: red;
    margin-top: 10px;
    display: none;
}

/* UNLOCK TEXT */
#unlockText {
    margin-top: 15px;
    opacity: 0;
    transition: 0.5s;
    color: #ff7eb3;
}

/* MOBILE */
@media (max-width: 600px) {
    input { width: 180px; }
    .welcome { font-size: 24px; }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- WELCOME -->
<div class="welcome" id="welcome">
    <div>
        <span id="typed"></span><br><br>
        <span class="glow">AKA VIDHU MAA ❤️</span><br><br>
        I made something for you ✨
    </div>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Enter the password ❤️</h2>

    <input type="password" id="pass" placeholder="Only you know..." />
    <br>

    <button onclick="check()">Enter</button>

    <div id="error">Wrong password chelloo ❤️</div>
    <div id="unlockText">Unlocking...</div>
</div>

<script>

/* FADE IN */
window.onload = () => {
    document.body.classList.add("loaded");
    typeText();
};

/* TYPEWRITER */
let text = "Vanakkam Kuttima 🙏❤️";
let i = 0;

function typeText() {
    if (i < text.length) {
        document.getElementById("typed").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 80);
    }
}

/* START MUSIC ON FIRST TAP */
let music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

/* SWITCH SCREEN */
setTimeout(() => {
    document.getElementById("welcome").style.opacity = "0";

    setTimeout(() => {
        document.getElementById("loginBox").style.opacity = "1";
    }, 800);

}, 3500);

/* LOGIN */
function check() {
    let p = document.getElementById("pass").value;

    if (p === "2502") {

        document.getElementById("unlockText").style.opacity = "1";

        setTimeout(() => {
            document.body.classList.remove("loaded");

            setTimeout(() => {
                window.location.href = "intro.html";
            }, 500);

        }, 1000);

    } else {
        document.getElementById("error").style.display = "block";
    }
}

</script>

</body>
</html>
