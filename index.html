<!DOCTYPE html>
<html>
<head>
<title>Enter ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;

    opacity: 0;
    transition: opacity 0.8s ease;
}

body.loaded {
    opacity: 1;
}

/* BOX */
.box {
    text-align: center;
}

/* INPUT */
input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 220px;
}

/* BUTTON */
button {
    padding: 10px 15px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

/* ERROR TEXT */
#error {
    color: red;
    margin-top: 10px;
    display: none;
}

/* UNLOCK TEXT */
#unlockText {
    margin-top: 15px;
    opacity: 0;
    transition: 0.5s;
    color: #ff7eb3;
}

/* MOBILE */
@media (max-width: 600px) {
    input {
        width: 180px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h2>Enter the password ❤️</h2>

    <input type="password" id="pass" placeholder="Only you know..." />
    <br>

    <button onclick="check()">Enter</button>

    <div id="error">Wrong password ❤️</div>

    <div id="unlockText">Unlocking...</div>
</div>

<script>

/* FADE IN */
window.onload = () => {
    document.body.classList.add("loaded");
};

/* LOGIN CHECK */
function check() {
    let p = document.getElementById("pass").value;

    if (p === "kuttima") {

        document.getElementById("unlockText").style.opacity = "1";

        setTimeout(() => {
            document.body.classList.remove("loaded");

            setTimeout(() => {
                window.location.href = "intro.html";
            }, 500);

        }, 1000);

    } else {
        document.getElementById("error").style.display = "block";
    }
}

</script>

</body>
</html>
