<!DOCTYPE html>
<html>
<head>
<title>Us ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =====================================================
   🔹 GLOBAL RESET & BASE STYLES
   ===================================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* =====================================================
   🔹 SCREEN SYSTEM (WELCOME / LOGIN TRANSITIONS)
   ===================================================== */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: opacity 1s;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

/* =====================================================
   🔹 WELCOME SCREEN TEXT
   ===================================================== */
.welcome-text {
    font-size: 32px;
    line-height: 1.6;
    cursor: pointer;
}

/* =====================================================
   🔹 LOGIN CARD UI (GLASS EFFECT)
   ===================================================== */
.login-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 40px 30px;
    border-radius: 16px;
    width: 280px;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
}

.login-card h2 {
    margin-bottom: 20px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.login-card button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

.login-card button:hover {
    background: #ff4b7d;
}

#error {
    margin-top: 10px;
    color: #ff4b7d;
    display: none;
}

/* =====================================================
   🔹 NAVBAR
   ===================================================== */
.navbar {
    position: fixed;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    background: rgba(0,0,0,0.4);
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* =====================================================
   🔹 HERO
   ===================================================== */
.hero {
    height: 100vh;
    background: url("photo1.jpeg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

#typedText {
    font-size: 50px;
}

/* =====================================================
   🔹 SECTIONS
   ===================================================== */
.section {
    padding: 100px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
    background: #111;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* =====================================================
   🔹 MEMORIES SCROLL
   ===================================================== */
.memory-scroll {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding: 20px;
    scroll-snap-type: x mandatory;
}

.memory-scroll::-webkit-scrollbar {
    display: none;
}

.memory-card {
    min-width: 250px;
    flex-shrink: 0;
    scroll-snap-align: center;
    text-align: center;
}

.memory-card img {
    width: 100%;
    border-radius: 12px;
}

.memory-card p {
    margin-top: 10px;
}

/* =====================================================
   🔹 SHOW MORE BUTTON
   ===================================================== */
.show-more {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
}

/* =====================================================
   🔹 FULL GALLERY GRID (NEW)
   ===================================================== */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 20px;
}

.gallery-grid img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.gallery-grid img:hover {
    transform: scale(1.05);
}

/* =====================================================
   🔹 SECRET
   ===================================================== */
.secret {
    margin-top: 40px;
    cursor: pointer;
    color: #ff7eb3;
}

.hidden-message {
    display: none;
    margin-top: 20px;
}

/* =====================================================
   🔹 HEARTS
   ===================================================== */
.heart {
    position: fixed;
    bottom: -10px;
    color: pink;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-100vh); opacity: 0; }
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="music.mp3">
</audio>

<!-- WELCOME -->
<div class="screen" id="welcome" onclick="goLogin()">
    <div class="welcome-text">
        <span id="typed"></span><br><br>
        <span id="typed2"></span><br><br>
        <small>Tap to enter our world ❤️</small>
    </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="login">
    <div class="login-card">
        <h2>Enter password</h2>
        <input type="password" id="pass" placeholder="Only you know..." />
        <button onclick="check()">Unlock</button>
        <div id="error">Wrong password ❤️</div>
    </div>
</div>

<!-- HOME -->
<div id="home" style="display:none;">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#memories">Memories</a>
    <a href="#letters">Letters</a>
</div>

<section class="hero" id="home">
    <h1 id="typedText"></h1>
</section>

<section class="section" id="memories">
    <h2>Our Memories 📸</h2>

    <div class="memory-scroll">
        <div class="memory-card">
            <img src="photo2.jpeg">
            <p>The day everything started ❤️</p>
        </div>

        <div class="memory-card">
            <img src="photo3.jpeg">
            <p>Still my favorite day ✨</p>
        </div>
    </div>

    <!-- 🔥 CONNECTED -->
    <button class="show-more" onclick="openGallery()">Show More ❤️</button>
</section>

<section class="section" id="letters">
    <h2>For You 💌</h2>
    <p>
        I don’t always say this… but you changed something in me.
    </p>

    <div class="secret" onclick="revealSecret()">
        Tap here…
    </div>

    <div class="hidden-message" id="secretMsg">
        You are my safe place ❤️
    </div>
</section>

</div>

<!-- =====================================================
     🔥 FULL GALLERY (NEW)
     ===================================================== -->
<div id="galleryView" style="display:none; padding:20px;">

    <button onclick="closeGallery()" style="margin-bottom:20px;">← Back</button>

    <h2 style="text-align:center;">All Memories ❤️</h2>

    <div class="gallery-grid">
        <img src="photo2.jpeg" onclick="openImage(this.src)">
        <img src="photo3.jpeg" onclick="openImage(this.src)">
        <img src="photo4.jpeg" onclick="openImage(this.src)">
        <img src="photo5.jpeg" onclick="openImage(this.src)">
    </div>

</div>

<!-- IMAGE VIEW -->
<div id="imageViewer" onclick="closeImage()" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:2000;
">
<img id="fullImg" style="max-width:90%; max-height:90%;">
</div>

<script>

/* EXISTING CODE KEPT SAME */

/* 🔥 NEW FUNCTIONS */
function openGallery() {
    document.getElementById("home").style.display = "none";
    document.getElementById("galleryView").style.display = "block";
}

function closeGallery() {
    document.getElementById("galleryView").style.display = "none";
    document.getElementById("home").style.display = "block";
}

function openImage(src) {
    document.getElementById("imageViewer").style.display = "flex";
    document.getElementById("fullImg").src = src;
}

function closeImage() {
    document.getElementById("imageViewer").style.display = "none";
}

</script>

</body>
</html>
