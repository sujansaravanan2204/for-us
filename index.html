<!DOCTYPE html>
<html>
<head>
<title>Us ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* COMMON SCREEN */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: opacity 1s;
}

/* HIDE */
.hidden {
    opacity: 0;
    pointer-events: none;
}

/* WELCOME */
.glow {
    color: #ff7eb3;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { text-shadow: 0 0 10px #ff7eb3; }
    50% { text-shadow: 0 0 25px #ff4b7d; }
    100% { text-shadow: 0 0 10px #ff7eb3; }
}

/* LOGIN */
input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    width: 220px;
}

button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
}

#error {
    display: none;
    color: red;
}

/* INTRO */
.intro h1 {
    font-size: 60px;
    animation: fade 2s forwards;
}

@keyframes fade {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

/* HOME */
.home {
    display: none;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    position: fixed;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.4);
}

/* HERO */
.hero {
    height: 100vh;
    background: url("photo1.jpeg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SECTIONS */
.section {
    padding: 100px 20px;
    background: #111;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    color: pink;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3">
</audio>

<!-- WELCOME -->
<div class="screen" id="welcome">
    <div>
        <span id="typed"></span><br><br>
        <span class="glow">AKA VIDHU MAA ❤️</span><br><br>
        I made something for you ✨
    </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="login">
    <div>
        <h2>Enter password ❤️</h2>
        <input type="password" id="pass"><br>
        <button onclick="check()">Enter</button>
        <div id="error">Wrong password chelloo ❤️</div>
    </div>
</div>

<!-- INTRO -->
<div class="screen hidden intro" id="intro">
    <h1>US ❤️</h1>
</div>

<!-- HOME -->
<div class="home" id="home">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#memories">Memories</a>
</div>

<div class="hero">
    <h1 id="mainText"></h1>
</div>

<div class="section" id="memories">
    <h2>Our Memories 📸</h2>
    <img src="photo1.jpeg" width="250">
    <p>The day everything started ❤️</p>
</div>

</div>

<script>

/* MUSIC START */
let music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

/* TYPE TEXT */
let text = "Vanakkam Kuttima 🙏❤️";
let i = 0;

function typeText() {
    if (i < text.length) {
        document.getElementById("typed").innerHTML += text[i];
        i++;
        setTimeout(typeText, 80);
    }
}
typeText();

/* FLOW */
setTimeout(() => {
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}, 3500);

function check() {
    if (document.getElementById("pass").value === "2502") {

        document.getElementById("login").classList.add("hidden");
        document.getElementById("intro").classList.remove("hidden");

        setTimeout(() => {
            document.getElementById("intro").classList.add("hidden");
            document.getElementById("home").style.display = "block";
            startMain();
        }, 2500);

    } else {
        document.getElementById("error").style.display = "block";
    }
}

/* MAIN TEXT */
function startMain() {
    let text = "Hey Love ❤️";
    let i = 0;
    function type() {
        if (i < text.length) {
            document.getElementById("mainText").innerHTML += text[i];
            i++;
            setTimeout(type, 80);
        }
    }
    type();
}

/* SCROLL ANIMATION */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".section").forEach(sec => {
        if (sec.getBoundingClientRect().top < window.innerHeight - 100) {
            sec.classList.add("show");
        }
    });
});

/* HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);

</script>

</body>
</html>
