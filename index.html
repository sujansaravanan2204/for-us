<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Us ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* background glow */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(255,255,255,0.1);
    filter: blur(120px);
    top: -100px;
    left: -100px;
}

/* container */
.container {
    text-align: center;
    animation: fadeIn 2s ease;
}

/* title */
h1 {
    font-size: 60px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* subtitle */
p {
    margin-bottom: 40px;
    opacity: 0.9;
}

/* buttons */
.buttons a {
    display: block;
    margin: 12px auto;
    padding: 14px;
    width: 220px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    
    transition: 0.3s;
}

/* hover effect */
.buttons a:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.3);
}

/* animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>Hey Love ❤️</h1>
    <p>This is our little world.</p>

    <div class="buttons">
        <a href="memories.html">Memories</a>
        <a href="letters.html">Letters</a>
        <a href="timeline.html">Our Story</a>
    </div>
</div>

</body>
</html>
