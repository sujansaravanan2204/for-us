<!DOCTYPE html>
<html>
<head>
<title>Us ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* SCREEN CONTROL */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    transition: opacity 1s;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

/* WELCOME */
.glow {
    color: #ff7eb3;
    animation: glow 1.5s infinite;
}

@keyframes glow {
    0% { text-shadow: 0 0 10px #ff7eb3; }
    50% { text-shadow: 0 0 25px #ff4b7d; }
    100% { text-shadow: 0 0 10px #ff7eb3; }
}

/* LOGIN */
input {
    padding: 12px;
    border-radius: 8px;
    border: none;
    width: 220px;
}

button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #ff7eb3;
    color: white;
}

#error {
    display: none;
    color: red;
}

/* INTRO */
.intro h1 {
    font-size: 60px;
    animation: fade 2s forwards;
}

@keyframes fade {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

/* HOME SECTION (YOUR ORIGINAL UI) */
.home {
    display: none;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("photo1.jpeg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

#typedText {
    font-size: 50px;
    text-shadow: 0 0 20px black;
}

/* SECTIONS */
.section {
    padding: 100px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
    background: #111;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* MEMORY */
.memory img {
    width: 250px;
    border-radius: 12px;
    margin: 10px;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -10px;
    color: pink;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-100vh); opacity: 0; }
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3">
</audio>

<!-- WELCOME -->
<div class="screen" id="welcome">
    <div>
        <span id="typed"></span><br><br>
        <span class="glow">AKA VIDHU MAA ❤️</span><br><br>
        I made something for you ✨
    </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="login">
    <div>
        <h2>Enter password ❤️</h2>
        <input type="password" id="pass"><br>
        <button onclick="check()">Enter</button>
        <div id="error">Wrong password chelloo ❤️</div>
    </div>
</div>

<!-- INTRO -->
<div class="screen hidden intro" id="intro">
    <h1>US ❤️</h1>
</div>

<!-- FULL HOME UI -->
<div class="home" id="home">

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#memories">Memories</a>
    <a href="#letters">Letters</a>
</div>

<section class="hero" id="home">
    <h1 id="typedText"></h1>
</section>

<section class="section" id="memories">
    <h2>Our Memories 📸</h2>

    <div class="memory">
        <img src="photo1.jpeg">
        <p>The day everything started ❤️</p>
    </div>

    <div class="memory">
        <img src="photo2.jpeg">
        <p>Still my favorite day ✨</p>
    </div>
</section>

<section class="section" id="letters">
    <h2>For You 💌</h2>
    <p>
        I don’t always say this… but you changed something in me.
        In the best way possible.
    </p>
</section>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

</div>

<script>

/* MUSIC */
let music = document.getElementById("bgMusic");
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

/* TYPING (WELCOME) */
let t = "Vanakkam Kuttima 🙏❤️";
let i = 0;
function typeWelcome() {
    if (i < t.length) {
        document.getElementById("typed").innerHTML += t[i];
        i++;
        setTimeout(typeWelcome, 80);
    }
}
typeWelcome();

/* FLOW */
setTimeout(() => {
    document.getElementById("welcome").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}, 3500);

function check() {
    if (document.getElementById("pass").value === "2502") {

        document.getElementById("login").classList.add("hidden");
        document.getElementById("intro").classList.remove("hidden");

        setTimeout(() => {
            document.getElementById("intro").classList.add("hidden");
            document.getElementById("home").style.display = "block";
            startMain();
        }, 2500);

    } else {
        document.getElementById("error").style.display = "block";
    }
}

/* MAIN TEXT */
function startMain() {
    let text = "Hey Love ❤️";
    let i = 0;
    function type() {
        if (i < text.length) {
            document.getElementById("typedText").innerHTML += text[i];
            i++;
            setTimeout(type, 80);
        }
    }
    type();
}

/* SCROLL */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".section").forEach(sec => {
        if (sec.getBoundingClientRect().top < window.innerHeight - 100) {
            sec.classList.add("show");
        }
    });
});

/* HEARTS */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);

/* MUSIC TOGGLE */
let isPlaying = true;
function toggleMusic() {
    if (isPlaying) {
        music.pause();
        isPlaying = false;
    } else {
        music.play();
        isPlaying = true;
    }
}

</script>

</body>
</html>
