<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Us ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 30px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    opacity: 0.7;
}

/* HERO SECTION (BACKGROUND IMAGE) */
.hero {
    height: 100vh;
    background: url("photo1.jpeg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 60px;
    text-shadow: 0 0 20px black;
}

/* SECTION STYLE */
.section {
    padding: 100px 20px;
    text-align: center;
    background: #111;
}

.section h2 {
    margin-bottom: 20px;
}

/* MEMORY IMAGES */
.memory img {
    width: 250px;
    border-radius: 12px;
    margin: 10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#memories">Memories</a>
    <a href="#letters">Letters</a>
</div>

<!-- HERO -->
<section class="hero" id="home">
    <h1>Hey Love ❤️</h1>
</section>

<!-- MEMORIES -->
<section class="section" id="memories">
    <h2>Our Memories 📸</h2>

    <div class="memory">
        <img src="photo1.jpeg">
        <p>Our first memory ❤️</p>
    </div>

    <div class="memory">
        <img src="photo2.jpeg">
        <p>Another beautiful moment ✨</p>
    </div>
</section>

<!-- LETTERS -->
<section class="section" id="letters">
    <h2>Letters 💌</h2>
    <p>
        You can write something personal here…  
        This is where it becomes special.
    </p>
</section>

</body>
</html>
