<!DOCTYPE html>
<html>
<head>
<title>Us ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* SCREENS */
.screen {
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    transition:1s;
}

.hidden { opacity:0; pointer-events:none; }

/* LOGIN */
.login-card {
    background:rgba(255,255,255,0.05);
    padding:40px;
    border-radius:16px;
}

.login-card input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}

.login-card button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff7eb3;
    color:white;
}

/* HERO */
.hero {
    height:100vh;
    background:url("photo1.jpeg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

#typedText { font-size:50px; }

/* SECTION */
.section {
    padding:100px 20px;
    text-align:center;
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.section.show {
    opacity:1;
    transform:translateY(0);
}

/* MEMORIES */
.memory-scroll {
    display:flex;
    gap:20px;
    overflow-x:auto;
}

.memory-card img {
    width:240px;
    height:280px;
    object-fit:cover;
    border-radius:12px;
}

/* ✅ FIXED LINKS (VERTICAL) */
.love-links {
    margin-top:25px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

.love-links a {
    width:280px;
    padding:12px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.love-links a:hover {
    background:#ff4b7d;
}

/* ✅ SECRET BUTTON BACK */
.secret {
    margin-top:40px;
    cursor:pointer;
    color:#ff7eb3;
}

.hidden-message {
    display:none;
    margin-top:20px;
}

/* HEART */
.heart {
    position:fixed;
    bottom:-10px;
    animation:floatUp 6s linear infinite;
}

@keyframes floatUp {
    to { transform:translateY(-100vh); opacity:0; }
}

</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="music.mp3">
</audio>

<!-- WELCOME -->
<div class="screen" id="welcome" onclick="goLogin()">
    <div>
        <h2 id="typed"></h2><br>
        <h3 id="typed2"></h3>
        <p>Tap ❤️</p>
    </div>
</div>

<!-- LOGIN -->
<div class="screen hidden" id="login">
    <div class="login-card">
        <h2>Password</h2>
        <input type="password" id="pass">
        <button onclick="check()">Unlock</button>
        <div id="error" style="color:red; display:none;">Wrong password</div>
    </div>
</div>

<!-- MAIN -->
<div id="home" style="display:none;">

<section class="hero">
    <h1 id="typedText"></h1>
</section>

<section class="section">
    <h2>Our Memories 📸</h2>

    <div class="memory-scroll">
        <img src="photo2.jpeg">
        <img src="photo3.jpeg">
        <img src="photo4.jpeg">
    </div>
</section>

<section class="section">
    <h2>For You 💌</h2>

    <p>You changed something in me…</p>

    <!-- ✅ FIXED LINKS -->
    <div class="love-links">

        <a href="https://sujansaravanan2204.github.io/for-her/" target="_blank">
            💌 First sorry note
        </a>

        <a href="https://sujansaravanan2204.github.io/I-LOVE-YOU/" target="_blank">
            ❤️ I LOVE YOU
        </a>

        <a href="https://drive.google.com/drive/folders/1UXv0B2x2mJCxUXaH_Ijt4mJpt0j3MRJx?usp=drive_link" target="_blank">
            📸 Our Photos
        </a>

    </div>

    <!-- ✅ SECRET BACK -->
    <div class="secret" onclick="revealSecret()">
        Tap here… ❤️
    </div>

    <div class="hidden-message" id="secretMsg">
        You are my safe place. Always.
    </div>

</section>

</div>

<script>

/* TYPE */
let t1="Vanakkam ❤️", t2="Vidhu maa ❤️";
let i=0,j=0;

function type1(){
 if(i<t1.length){
  document.getElementById("typed").innerHTML+=t1[i++];
  setTimeout(type1,80);
 } else setTimeout(type2,400);
}

function type2(){
 if(j<t2.length){
  document.getElementById("typed2").innerHTML+=t2[j++];
  setTimeout(type2,80);
 }
}

type1();

/* FLOW */
function goLogin(){
 document.getElementById("welcome").classList.add("hidden");
 document.getElementById("login").classList.remove("hidden");
}

setTimeout(goLogin,5000);

/* LOGIN */
function check(){
 if(document.getElementById("pass").value==="2502"){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("home").style.display="block";
  startMain();
 } else {
  document.getElementById("error").style.display="block";
 }
}

/* HERO */
function startMain(){
 let txt="Hey Love ❤️",i=0;
 function t(){
  if(i<txt.length){
   document.getElementById("typedText").innerHTML+=txt[i++];
   setTimeout(t,80);
  }
 }
 t();
}

/* SECRET */
function revealSecret(){
 document.getElementById("secretMsg").style.display="block";
}

/* SCROLL */
window.addEventListener("scroll",()=>{
 document.querySelectorAll(".section").forEach(s=>{
  if(s.getBoundingClientRect().top<window.innerHeight-100){
   s.classList.add("show");
  }
 });
});

/* HEARTS */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="❤️";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);

</script>

</body>
</html>
